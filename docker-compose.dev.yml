name: url-shortener
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        AWS="aws --endpoint-url http://dynamodb-local:8000"

        if $$AWS dynamodb describe-table --table-name ${URL_TABLE} 2>/dev/null | grep -q ${URL_USER_INDEX}; then
          echo "table '${URL_TABLE}' already has ${URL_USER_INDEX}"
        else
          $$AWS dynamodb delete-table --table-name ${URL_TABLE} 2>/dev/null || true
          sleep 1
          $$AWS dynamodb create-table \
            --table-name ${URL_TABLE} \
            --attribute-definitions \
              AttributeName=code,AttributeType=S \
              AttributeName=userId,AttributeType=S \
            --key-schema AttributeName=code,KeyType=HASH \
            --global-secondary-indexes \
              "IndexName=${URL_USER_INDEX},KeySchema=[{AttributeName=userId,KeyType=HASH}],Projection={ProjectionType=ALL}" \
            --billing-mode PAY_PER_REQUEST
        fi

        if $$AWS dynamodb describe-table --table-name ${USER_TABLE} 2>/dev/null | grep -q ${USER_USERNAME_INDEX}; then
          echo "table '${USER_TABLE}' already has ${USER_USERNAME_INDEX}"
        else
          $$AWS dynamodb delete-table --table-name ${USER_TABLE} 2>/dev/null || true
          sleep 1
          $$AWS dynamodb create-table \
            --table-name ${USER_TABLE} \
            --attribute-definitions \
              AttributeName=userId,AttributeType=S \
              AttributeName=username,AttributeType=S \
            --key-schema AttributeName=userId,KeyType=HASH \
            --global-secondary-indexes \
              "IndexName=${USER_USERNAME_INDEX},KeySchema=[{AttributeName=username,KeyType=HASH}],Projection={ProjectionType=ALL}" \
            --billing-mode PAY_PER_REQUEST
        fi

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
      target: dev
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    environment:
      PORT: ${PORT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      URL_TABLE: ${URL_TABLE}
      URL_USER_INDEX: ${URL_USER_INDEX}
      USER_TABLE: ${USER_TABLE}
      USER_USERNAME_INDEX: ${USER_USERNAME_INDEX}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET:?copy .env.example to .env and set JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./services/backend/src:/app/services/backend/src
      - ./services/backend/nest-cli.json:/app/services/backend/nest-cli.json
      - ./services/backend/tsconfig.json:/app/services/backend/tsconfig.json
      - ./services/backend/tsconfig.build.json:/app/services/backend/tsconfig.build.json

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      target: dev
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./services/frontend/src:/app/services/frontend/src
      - ./services/frontend/index.html:/app/services/frontend/index.html
      - ./services/frontend/vite.config.ts:/app/services/frontend/vite.config.ts
      - ./services/frontend/tsconfig.json:/app/services/frontend/tsconfig.json
      - ./services/frontend/tsconfig.node.json:/app/services/frontend/tsconfig.node.json
      - ./services/frontend/tailwind.config.js:/app/services/frontend/tailwind.config.js
      - ./services/frontend/postcss.config.js:/app/services/frontend/postcss.config.js
