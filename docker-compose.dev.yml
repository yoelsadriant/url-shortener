name: url-shortener
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    env_file: .env
    entrypoint: ["/bin/sh", "/init-dynamo.sh"]
    volumes:
      - ./scripts/init-dynamo.sh:/init-dynamo.sh:ro

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
      target: dev
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./services/backend:/app/services/backend
      - /app/services/backend/node_modules

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      target: dev
    depends_on:
      - backend
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./services/frontend:/app/services/frontend
      - /app/services/frontend/node_modules
