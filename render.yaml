# Render.com POC deploy — free tier, no AWS, no Blueprint, no paid services.
# The backend image bundles DynamoDB Local in the same container (see
# the `render-poc` target in services/backend/Dockerfile).
# Set this up via the Render UI (Web Service + Static Site), or use the
# values below as a reference. Data is in-memory and wipes on restart.

services:
  - type: web
    name: url-shortener-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: services/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerfileTarget: render-poc      # bundles DDB Local in the same image
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: PUBLIC_BASE_URL
        fromService:
          type: web
          name: url-shortener-backend
          property: host
      - key: AWS_REGION
        value: ap-southeast-1
      - key: AWS_ACCESS_KEY_ID
        value: local
      - key: AWS_SECRET_ACCESS_KEY
        value: local
      - key: URL_TABLE
        value: urls
      - key: URL_USER_INDEX
        value: user-index
      - key: USER_TABLE
        value: users
      - key: USER_USERNAME_INDEX
        value: username-index
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

  - type: web
    name: url-shortener-frontend
    runtime: static
    plan: free
    rootDir: services/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: url-shortener-backend
          property: host
