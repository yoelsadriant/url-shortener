version: 2

updates:
  # npm — one entry per lockfile in the monorepo
  - package-ecosystem: npm
    directory: /services/backend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /services/frontend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /infra
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # GitHub Actions used in workflows and composite actions
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    groups:
      actions:
        update-types: [minor, patch, major]

  # Docker base images (services/backend/Dockerfile)
  - package-ecosystem: docker
    directory: /services/backend
    schedule: { interval: weekly }
