name: canary

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target BASE_URL (defaults to repository variable CANARY_BASE_URL; falls back to a local stack)'
        required: false

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - id: target
        uses: ./.github/actions/resolve-target
        with:
          dispatch_input: ${{ github.event.inputs.base_url }}
          repo_var: ${{ vars.CANARY_BASE_URL }}

      - if: steps.target.outputs.mode == 'local'
        uses: actions/setup-node@v6
        with:
          node-version-file: services/backend/.nvmrc
          cache: npm
          cache-dependency-path: services/backend/package-lock.json

      - if: steps.target.outputs.mode == 'local'
        uses: ./.github/actions/start-local-stack

      - name: run k6 canary
        run: |
          docker run --rm -i --network host \
            -e BASE_URL='${{ steps.target.outputs.url }}' \
            -v "$PWD/tests:/tests" -v "$PWD:/work" -w /work \
            grafana/k6 run /tests/redirect-canary.js

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: canary-summary-${{ github.run_number }}
          path: summary.json
          retention-days: 7

      - if: always() && steps.target.outputs.mode == 'local'
        run: |
          docker compose -f services/backend/compose.yml --profile dev logs --no-color > docker-logs.txt || true
          cp /tmp/backend.log backend.log 2>/dev/null || true

      - if: failure() && steps.target.outputs.mode == 'local'
        uses: actions/upload-artifact@v7
        with:
          name: canary-server-logs
          path: |
            docker-logs.txt
            backend.log
          retention-days: 7
