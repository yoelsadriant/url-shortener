name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4
      - name: seed .env so mise can auto-load it
        run: cp .env.example .env
      - name: install Node via mise (uses services/backend/mise.toml)
        uses: jdx/mise-action@v2
        with:
          working_directory: services/backend
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('services/backend/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: start DynamoDB Local + seed tables
        run: |
          docker compose -f compose.yml --profile dev up -d dynamodb-local
          ./scripts/init-tables.sh
      - run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --run
      - name: lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: services/frontend/.lighthouseci
          retention-days: 7

  e2e-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: install frontend deps + Playwright browsers
        working-directory: services/frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - uses: ./.github/actions/start-local-stack
      - name: run Playwright
        working-directory: services/frontend
        run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/frontend/playwright-report
          retention-days: 7
      - if: always()
        run: |
          docker compose -f services/backend/compose.yml --profile dev logs --no-color > docker-logs.txt || true
          cp /tmp/backend.log backend.log 2>/dev/null || true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            docker-logs.txt
            backend.log
          retention-days: 7

  infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      # `cdk synth` needs the real built frontend (bin/app.ts uploads dist/ via
      # BucketDeployment). A one-file stub keeps CI honest without running the
      # full frontend build.
      - name: stub frontend dist for synth
        run: |
          mkdir -p ../services/frontend/dist
          echo '<!doctype html>' > ../services/frontend/dist/index.html
      - run: npm run synth -- --quiet

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build backend prod image
        uses: docker/build-push-action@v6
        with:
          context: services/backend
          target: prod
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
