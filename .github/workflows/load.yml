name: load

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target BASE_URL (defaults to repository variable LOAD_BASE_URL; falls back to a local stack)'
        required: false
      seed_count:
        description: 'Number of short URLs to seed before the ramp'
        required: false
        default: '50'

concurrency:
  group: load
  cancel-in-progress: true

jobs:
  load:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - id: target
        uses: ./.github/actions/resolve-target
        with:
          dispatch_input: ${{ github.event.inputs.base_url }}
          repo_var: ${{ vars.LOAD_BASE_URL }}

      - if: steps.target.outputs.mode == 'local'
        uses: actions/setup-node@v5
        with:
          node-version-file: services/backend/.nvmrc
          cache: npm
          cache-dependency-path: services/backend/package-lock.json

      - if: steps.target.outputs.mode == 'local'
        uses: ./.github/actions/start-local-stack

      - name: run k6 load test
        run: |
          docker run --rm -i --network host \
            -e BASE_URL='${{ steps.target.outputs.url }}' \
            -e SEED_COUNT='${{ github.event.inputs.seed_count || '50' }}' \
            -v "$PWD/tests:/tests" -v "$PWD:/work" -w /work \
            grafana/k6 run --summary-export=summary.json /tests/redirect-load.js

      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: load-summary-${{ github.run_number }}
          path: summary.json
          retention-days: 30

      - if: always() && steps.target.outputs.mode == 'local'
        run: |
          docker compose -f services/backend/compose.yml --profile dev logs --no-color > docker-logs.txt || true
          cp /tmp/backend.log backend.log 2>/dev/null || true

      - if: failure() && steps.target.outputs.mode == 'local'
        uses: actions/upload-artifact@v5
        with:
          name: load-server-logs
          path: |
            docker-logs.txt
            backend.log
          retention-days: 7
